version: '3.8'

services:
  # ==================== OpenGauss 数据库 ====================
  opengauss:
    image: opengauss/opengauss-server:latest
    container_name: hospital-opengauss
    privileged: true
    environment:
      GS_PASSWORD: "Yudao@2024"          # 超级用户 omm 的密码，需含大小写+数字+特殊符号
      GS_USERNAME: "root"                # 创建普通用户，与项目配置一致
      GS_USER_PASSWORD: "Yudao@2024"     # 普通用户密码
      GS_DB: "hospital_db"               # 创建的数据库名
      GS_PORT: "5432"                    # 容器内端口
    ports:
      - "5432:5432"                      # 映射到宿主机 5432，与 application-local.yaml 一致
    volumes:
      - opengauss-data:/var/lib/opengauss  # 数据持久化
      - ./ruoyi-vue-pro/sql/mysql:/docker-entrypoint-initdb.d  # 自动执行初始化SQL（如支持）
    healthcheck:
      test: ["CMD-SHELL", "gsql -d hospital_db -U root -W Yudao@2024 -p 5432 -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: hospital-redis
    ports:
      - "6379:6379"                      # 与 application-local.yaml 一致
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes  # 开启 AOF 持久化
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  opengauss-data:
    driver: local
  redis-data:
    driver: local
